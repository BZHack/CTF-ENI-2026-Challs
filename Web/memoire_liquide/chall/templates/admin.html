{% extends "base.html" %}
{% block content %}
<div style="
  min-height: 70vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
">
  <h2 style="margin-bottom: 5px;">Admin</h2>
<div class="form-center">
  <div style="text-align:center;">
    <p style="font-style: italic; color: #6b4a2f;">
	{% if flag %}
	  <p style="font-weight:bold; color:#5b3c2a;">{{ flag }}</p>
	{% else %}
	  <p style="color:red; font-weight:bold;">Accès refusé</p>
	{% endif %}
  </div>
</div>
{% endblock %}
